server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/wasm;
    gzip_vary on;
    gzip_comp_level 6;

    # SPA routing - fallback to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebAssembly MIME type (critical for .wasm files)
    location ~ \.wasm$ {
        add_header Content-Type application/wasm;
        add_header Cache-Control "public, immutable";
        expires 1y;
    }

    # JavaScript modules
    location ~ \.js$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # CSS files
    location ~ \.css$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # Static assets (images, fonts)
    location ~* \.(ico|jpg|jpeg|png|gif|svg|woff|woff2|eot|ttf|otf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
    }

    # HTML files - no cache to ensure fresh content
    location ~* \.html?$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        expires 1h;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
