name: Deploy KMP Web (wasmJs)

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Multi-arch build support
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            
            # Get lowercase names for registry
            GH_USER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_URI="ghcr.io/$GH_USER/$REPO_NAME-web:latest"
            
            echo "Deploying $IMAGE_URI..."
            
            # Login to registry
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u $GH_USER --password-stdin
            
            # Pull latest image
            sudo docker pull $IMAGE_URI
            
            # Stop and remove old container
            sudo docker stop ubus-web || true
            sudo docker rm ubus-web || true
            
            # Start new container
            sudo docker run -d \
              --name ubus-web \
              -p 80:80 \
              --restart unless-stopped \
              -e NODE_ENV=production \
              $IMAGE_URI
            
            # Wait for container to be healthy
            sleep 5
            
            # Check if container is running
            if ! sudo docker ps | grep -q ubus-web; then
              echo "Container failed to start!"
              sudo docker logs ubus-web || true
              exit 1
            fi
            
            echo "Deployment successful!"
            
            # Cleanup dangling images
            sudo docker image prune -f
